name: Secret Scan (gitleaks)

# Scans the repository (and, on schedule, its full history) for committed secrets.
# Runs on GitHub-hosted runners so fork PRs never touch self-hosted infrastructure.

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC — full-history sweep
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # A full checkout is required to scan the entire commit history.
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
