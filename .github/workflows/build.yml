name: Build Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build — ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # arm64 (M-series runner)
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: ubuntu-22.04   # pinned: ubuntu-latest may lack libwebkit2gtk-4.0-dev
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download Go dependencies
        run: go mod download

      - name: Install garble (macOS & Linux only)
        if: matrix.platform != 'windows'
        run: go install mvdan.cc/garble@latest

      - name: Install NSIS (Windows only)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          choco install nsis
          # Explicitly add NSIS to the GitHub runner's PATH for subsequent steps
          echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH

      - name: Prepare version string
        id: prep
        shell: bash
        run: |
          # Replace / with - in branch names to avoid path issues in filenames
          CLEAN_REF=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "version=${CLEAN_REF}" >> $GITHUB_OUTPUT

      # ── Standard Wails Builds ──────────────────────────────────────────────

      - name: Build (macOS & Linux)
        if: matrix.platform != 'windows'
        # Run the standard Wails build first.  This step:
        #   1. Compiles and bundles the React frontend into frontend/dist.
        #   2. Generates the Wails JS/TS bindings.
        #   3. Compiles the Go binary (non-obfuscated).
        # Garble is NOT applied here because GOFLAGS=-toolexec=garble would
        # be active during step 2 (binding generation), which runs before
        # frontend/dist exists.  The //go:embed all:frontend/dist directive
        # then fails with "no matching files found".  The obfuscated binary
        # is produced in the next step once all embed inputs are present.
        #
        # -ldflags "-s -w"  strips the symbol table (-s) and DWARF debug info
        #                   (-w) so function/variable names are not recoverable.
        # -trimpath         removes all local file-system paths embedded by the
        #                   compiler (source file references, module cache paths).
        run: wails build -clean -ldflags "-s -w" -trimpath
        env:
          # The macOS arm64 runner has 7 GB RAM.  javascript-obfuscator's
          # control-flow flattening can multiply the AST size of each
          # function several times over.  Combined with Terser's multi-pass
          # compression running in the same Node process, the default 4 GB
          # limit is insufficient.  6 GB leaves ~1 GB for the OS.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Build & Package Installer (Windows)
        if: matrix.platform == 'windows'
        # Since we dropped garble for Windows, we can let Wails handle 
        # both the compilation AND the NSIS installer generation natively!
        run: wails build -clean -nsis -ldflags "-s -w" -trimpath
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # ── Rebuild Go binary with garble ──────────────────────────────────────
      # frontend/dist is now fully populated, so //go:embed resolves correctly.
      # garble recompiles the same package with obfuscation (hashed package
      # paths, mangled identifiers) and overwrites the binary that wails build
      # produced.  Wails' platform packaging (macOS .app bundle structure,
      # Windows manifest/icon) is left intact.

      - name: Obfuscate binary (macOS)
        if: matrix.platform == 'darwin'
        # CGO_LDFLAGS supplies the UniformTypeIdentifiers framework that Wails
        # uses for file-type handling (_OBJC_CLASS_$_UTType).  wails build adds
        # this via its own CGO setup; garble build running standalone only sees
        # #cgo LDFLAGS directives in the source, which omit this framework,
        # causing an "Undefined symbols for architecture arm64" linker error.
        # Go aggregates CGO_LDFLAGS into the external link command alongside
        # all #cgo LDFLAGS entries, so setting it here is sufficient.
        env:
          CGO_LDFLAGS: -framework UniformTypeIdentifiers
        run: |
          garble build \
            -tags desktop,production \
            -trimpath -ldflags="-s -w" \
            -o build/bin/thaw.app/Contents/MacOS/thaw \
            .

      - name: Obfuscate binary (Linux)
        if: matrix.platform == 'linux'
        run: |
          garble build \
            -tags desktop,production \
            -trimpath -ldflags="-s -w" \
            -o build/bin/thaw \
            .

      # ── Rename / package output with tag version ───────────────────────────
      - name: Package macOS app bundle
        if: matrix.platform == 'darwin'
        run: |
          cd build/bin
          zip -r "thaw-${{ steps.prep.outputs.version }}-darwin-arm64.zip" thaw.app

      - name: Rename Windows binaries
        if: matrix.platform == 'windows'
        shell: pwsh
        # Wails natively outputted both the raw executable and the installer, we rename both
        run: |
          Move-Item build/bin/thaw.exe "build/bin/thaw-${{ steps.prep.outputs.version }}-windows-amd64-portable.exe"
          Move-Item build/bin/thaw-amd64-installer.exe "build/bin/thaw-${{ steps.prep.outputs.version }}-windows-amd64-installer.exe"

      - name: Rename Linux binary
        if: matrix.platform == 'linux'
        run: mv build/bin/thaw "build/bin/thaw-${{ steps.prep.outputs.version }}-linux-amd64"

      # ── Store artifact ─────────────────────────────────────────────────────
      # Currently retained as a workflow artifact (30-day expiry).
      # See the storage placeholder comment below to switch to permanent storage.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thaw-${{ steps.prep.outputs.version }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: build/bin/thaw-${{ steps.prep.outputs.version }}-*
          retention-days: 30
          if-no-files-found: error

      # ── Storage placeholder ────────────────────────────────────────────────
      # Replace/supplement upload-artifact above with one of these options once
      # a permanent distribution target is chosen:
      #
      # GitHub Releases (attach binaries to the tag's release page):
      #   - uses: softprops/action-gh-release@v2
      #     with:
      #       files: build/bin/thaw-${{ steps.prep.outputs.version }}-*
      #
      # Amazon S3 / Cloudflare R2:
      #   - run: aws s3 cp build/bin/thaw-${{ steps.prep.outputs.version }}-* s3://your-bucket/builds/
      #     env:
      #       AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #       AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #
      # Google Cloud Storage:
      #   - uses: google-github-actions/upload-cloud-storage@v2
      #     with:
      #       path: build/bin
      #       destination: your-gcs-bucket/builds