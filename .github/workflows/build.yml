name: Build Binaries

on:
  # push:
  #   tags:
  #     - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Test Azure Login
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Sign Windows binaries (Azure Trusted Signing) ───────────────────────
      - name: Azure Login (Windows only)
        if: matrix.platform == 'windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          allow-no-subscriptions: true
          auth-type: SERVICE_PRINCIPAL

      - name: Verify login
        shell: pwsh
        run: az account show
