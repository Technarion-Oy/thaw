# TEMPORARY: build.yml's real content is replaced on this branch only, so the
# macOS sign test can be dispatched via `gh workflow run build.yml --ref <branch>`
# (new workflows cannot be dispatched from non-default branches). REVERT this
# file to the main version before merging.
name: macOS Sign Test (temporary, via build.yml)

on:
  workflow_dispatch:

jobs:
  sign-test:
    name: Sign test — darwin-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-large # Intel (x86_64) runner
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download Go dependencies
        run: go mod download

      - name: Install garble
        run: go install mvdan.cc/garble@latest

      # Runs before the (slow) build so broken signing secrets fail in seconds.
      - name: Set up signing keychain (macOS)
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          echo "Decoded .p12 size: $(wc -c < "$RUNNER_TEMP/certificate.p12") bytes"

          # Re-pack the p12 with the system LibreSSL before importing. Apple's
          # `security import` rejects several valid p12 variants (PBES2/AES
          # exports from OpenSSL 3, password-encoding mismatches for non-ASCII
          # passwords) with an unhelpful "MAC verification failed".
          # /usr/bin/openssl (LibreSSL) reads both legacy and modern p12 files,
          # and its -export defaults produce a p12 Apple always accepts.
          export REPACK_PASSWORD="$(openssl rand -hex 16)"
          echo "::add-mask::$REPACK_PASSWORD"
          if ! /usr/bin/openssl pkcs12 -in "$RUNNER_TEMP/certificate.p12" -nodes \
               -passin env:APPLE_CERTIFICATE_PASSWORD \
               -out "$RUNNER_TEMP/signing.pem" 2> "$RUNNER_TEMP/p12-check.log"; then
            echo "::error::Cannot open the decoded .p12 with APPLE_CERTIFICATE_PASSWORD — the password or base64 secret is wrong. openssl said:"
            cat "$RUNNER_TEMP/p12-check.log"
            exit 1
          fi
          /usr/bin/openssl pkcs12 -export -in "$RUNNER_TEMP/signing.pem" \
            -passout env:REPACK_PASSWORD -out "$RUNNER_TEMP/certificate-repacked.p12"
          rm "$RUNNER_TEMP/signing.pem"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate-repacked.p12" -k "$KEYCHAIN_PATH" \
            -P "$REPACK_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the key without a UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/certificate-repacked.p12"

      - name: Build (macOS)
        run: wails build -obfuscated -platform darwin/${{ matrix.arch }} -clean -tags webkit2_41 -ldflags "-s -w -X thaw/internal/version.Version=0.0.0-signtest" -trimpath
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # ── Sign, notarize & staple (same steps as manual-release.yml) ──────────

      - name: Sign app bundle (macOS)
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in keychain — check APPLE_CERTIFICATE_BASE64/APPLE_CERTIFICATE_PASSWORD"
            exit 1
          fi
          echo "Signing with identity: $IDENTITY"
          codesign --deep --force --options runtime \
            --timestamp \
            --entitlements build/darwin/entitlements.plist \
            --sign "$IDENTITY" \
            build/bin/thaw.app
          codesign --verify --strict --verbose=2 build/bin/thaw.app

      - name: Notarize and staple (macOS)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # ditto preserves extended attributes/resource forks, unlike plain zip
          ditto -c -k --keepParent build/bin/thaw.app build/bin/thaw-notarize.zip

          SUBMISSION=$(xcrun notarytool submit build/bin/thaw-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)
          echo "$SUBMISSION"
          rm build/bin/thaw-notarize.zip

          STATUS=$(echo "$SUBMISSION" | jq -r '.status')
          SUBMISSION_ID=$(echo "$SUBMISSION" | jq -r '.id')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$STATUS' — fetching log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple build/bin/thaw.app
          spctl -a -vvv -t install build/bin/thaw.app

      - name: Clean up signing keychain (macOS)
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/certificate-repacked.p12" "$RUNNER_TEMP/signing.pem"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      # Zip with ditto so the stapled ticket and signatures survive the
      # artifact round-trip (actions/upload-artifact strips xattrs from bare dirs)
      - name: Package signed app
        run: |
          cd build/bin
          ditto -c -k --keepParent thaw.app thaw-signtest-darwin-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thaw-signtest-darwin-${{ matrix.arch }}
          path: build/bin/thaw-signtest-darwin-${{ matrix.arch }}.zip
          retention-days: 3
