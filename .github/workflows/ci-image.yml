name: CI Image

# Builds and pushes the prebuilt CI base image (.github/docker/ci.Dockerfile)
# to GHCR, for self-hosted workflows that want to pull a baked toolchain
# instead of apt-installing it on every run.
#
# Manual dispatch only: this is the one workflow that needs a GitHub-hosted
# runner (Docker + a clean workspace), which costs hosted minutes — so it is
# never run automatically. Trigger it by hand when the Dockerfile changes or to
# refresh the base image; rebuild `:latest` only when you actually need to.

on:
  workflow_dispatch:

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push CI image
    # GitHub-hosted: ships Docker + a clean workspace. The self-hosted runners
    # mix container and host jobs on a shared _work dir, which leaves root-owned
    # files a host job can't clean (checkout fails on .git/index.lock). This is
    # an infrequent image build that publishes to GHCR for the self-hosted jobs
    # to pull, so a hosted runner is the right tool (matches build.yml).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/technarion-oy/thaw-ci

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker is available
        run: docker --version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Dockerfile copies nothing from the repo, so use a tiny build context
      # (the docker dir) rather than the whole working tree.
      - name: Build and push image
        run: |
          docker build \
            -f .github/docker/ci.Dockerfile \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${GITHUB_SHA}" \
            .github/docker
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"
