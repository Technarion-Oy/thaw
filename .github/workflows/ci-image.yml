name: CI Image

# Builds and pushes the prebuilt CI base image (.github/docker/ci.Dockerfile)
# to GHCR. The self-hosted workflows pull this image instead of apt-installing
# the toolchain on every run.
#
# Runs when the Dockerfile/this workflow changes, weekly to pick up base-image
# security updates, and on manual dispatch. Trigger it manually once before the
# consuming workflows can pull `:latest`.

on:
  push:
    branches: [main]
    paths:
      - ".github/docker/ci.Dockerfile"
      - ".github/workflows/ci-image.yml"
  # TEMPORARY (PR #483): build & push the image from this PR so build-check can
  # adopt it before merge. Remove this pull_request trigger before merging —
  # keep only push-to-main, schedule, and workflow_dispatch.
  pull_request:
    paths:
      - ".github/docker/ci.Dockerfile"
      - ".github/workflows/ci-image.yml"
  schedule:
    - cron: "0 5 * * 1" # Every Monday at 05:00 UTC — refresh base-image patches
  workflow_dispatch:

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push CI image
    # GitHub-hosted: ships Docker + a clean workspace. The self-hosted runners
    # mix container and host jobs on a shared _work dir, which leaves root-owned
    # files a host job can't clean (checkout fails on .git/index.lock). This is
    # an infrequent image build that publishes to GHCR for the self-hosted jobs
    # to pull, so a hosted runner is the right tool (matches build.yml).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/technarion-oy/thaw-ci

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker is available
        run: docker --version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The Dockerfile copies nothing from the repo, so use a tiny build context
      # (the docker dir) rather than the whole working tree.
      - name: Build and push image
        run: |
          docker build \
            -f .github/docker/ci.Dockerfile \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${GITHUB_SHA}" \
            .github/docker
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"
