name: Build Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "frontend/**"
      - "wails.json"
      - ".github/workflows/build-check.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "frontend/**"
      - "wails.json"
      - ".github/workflows/build-check.yml"
  workflow_dispatch:

# Cancel an in-progress run when a new commit is pushed to the same ref, so
# rapid PR pushes don't queue up redundant builds on the self-hosted runners.
concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Verifies the Wails app compiles and links (Go backend + embedded frontend).
  # Builds linux/amd64 only — the self-hosted runners are Linux containers.
  # No -obfuscated/garble here: this is a build-verification check, not a
  # release artifact, so we skip the slow obfuscation pass. Cross-platform
  # release binaries are produced by build.yml / manual-release.yml.
  build:
    name: Wails build (linux/amd64)
    runs-on: self-hosted
    container: ubuntu:24.04
    permissions:
      contents: read

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl wget gcc pkg-config

      - uses: actions/checkout@v4

      # cache: true caches the Go module + build cache (keyed on go.sum), so
      # incremental runs skip recompiling the dependency graph and the Wails
      # CLI. No-ops gracefully if the self-hosted runners lack a cache backend.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Restore node_modules so `wails build`'s internal `npm install` is a
      # fast no-op when the lockfile is unchanged.
      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install system dependencies
        run: apt-get update && apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download Go dependencies
        run: go mod download

      # webkit2_41: Ubuntu 24.04 only ships libwebkit2gtk-4.1-dev; without this
      # tag, Wails' CGO directives default to webkit2gtk-4.0 and pkg-config fails.
      # No -clean: preserving build output lets the cached Go build cache speed
      # up incremental compiles. THAW_FAST_BUILD skips the slow Terser/obfuscator
      # frontend passes — this check verifies compile+link+bundle, not artifacts.
      - name: Build Wails app
        run: wails build -platform linux/amd64 -tags webkit2_41
        env:
          THAW_FAST_BUILD: "1"
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Unlock permissions for host runner agent
        if: always()
        run: chmod -R 777 $GITHUB_WORKSPACE/../../_actions || true
