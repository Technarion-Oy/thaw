name: Integration Tests

# Least-privilege default: read-only token unless a job opts into more.
permissions:
  contents: read

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 02:00 UTC
  workflow_dispatch:

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  test:
    name: Snowflake integration tests
    runs-on: self-hosted
    container: ubuntu:24.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl wget gcc bash

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run integration tests
        shell: bash
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          # Optional: set these secrets to target a specific database/schema
          # for migration integration tests (defaults to CURRENT_DATABASE()/PUBLIC).
          SNOWFLAKE_TEST_DATABASE: ${{ secrets.SNOWFLAKE_TEST_DATABASE }}
          SNOWFLAKE_TEST_SCHEMA: ${{ secrets.SNOWFLAKE_TEST_SCHEMA }}
        run: |
          set -o pipefail
          go test -v -tags integration -race -count=1 -timeout 10m ./internal/integration/... 2>&1 | tee /dev/stderr | go-junit-report -set-exit-code > report.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        # Best-effort reporting; the go test step already fails the job on real
        # failures. Don't let a flaky GitHub API throttle (429) fail the build.
        continue-on-error: true
        with:
          files: report.xml
          compare_to_earlier_commit: false

      - name: Unlock permissions for host runner agent
        if: always() 
        run: chmod -R 777 $GITHUB_WORKSPACE/../../_actions || true
