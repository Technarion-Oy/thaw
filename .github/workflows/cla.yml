name: CLA Assistant

# Blocks a PR from being mergeable until every contributor has signed the
# Contributor License Agreement (see CLA.md). Contributors sign by commenting the
# agreed sentence on their PR; signatures are recorded in a JSON file in a branch.
#
# SECURITY: this workflow uses `pull_request_target` (so it can write the
# signatures file and comment on fork PRs), but it NEVER checks out the PR's code —
# the contributor-assistant action only reads/writes the signatures file and posts
# comments. Do not add an `actions/checkout` of the PR head here.
#
# SETUP (one-time, by a repo admin):
#   1. Create a Personal Access Token with `repo` scope and add it as the
#      `CLA_SIGNATURES_TOKEN` secret (used to commit the signatures file).
#   2. Optionally point `path-to-signatures` / `branch` at a private repo instead
#      of this one if signatures should not live in the public tree.

permissions:
  contents: read

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  cla:
    name: CLA signature check
    runs-on: ubuntu-latest
    # Only act on PR comments, never on plain issue comments.
    if: (github.event.issue.pull_request || github.event_name == 'pull_request_target')
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA.') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with repo scope, used only to commit the signatures file.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: ".github/cla/signatures.json"
          path-to-document: "https://github.com/Technarion-Oy/thaw/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],*[bot]"
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge, please read our
            [Contributor License Agreement](https://github.com/Technarion-Oy/thaw/blob/main/CLA.md)
            and sign it by posting the following comment on this PR:
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA."
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
          lock-pullrequest-aftermerge: false
