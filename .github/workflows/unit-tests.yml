name: Unit Tests

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "frontend/src/**"
      - "frontend/package*.json"
      - "wails.json"
      - ".github/workflows/unit-tests.yml"

jobs:
  # ── DDL parser tests (no system deps, fast) ────────────────────────────────
  ddl-unit-tests:
    name: DDL unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run DDL unit tests
        run: go test -v -race -count=1 ./internal/ddl/... 2>&1 | go-junit-report -set-exit-code > report-ddl.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report-ddl.xml
          check_name: DDL unit tests

  # ── SQLEditor parser & validation tests (no system deps, fast) ─────────────
  sqleditor-unit-tests:
    name: SQLEditor unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run SQLEditor unit tests
        run: go test -v -race -count=1 ./internal/sqleditor/... 2>&1 | go-junit-report -set-exit-code > report-sqleditor.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report-sqleditor.xml
          check_name: SQLEditor unit tests

  # ── Migration helper tests (package main, requires GTK/WebKit) ────────────
  migration-unit-tests:
    name: Migration unit tests
    # Pinned: ubuntu-latest may lack libwebkit2gtk-4.0-dev (same as build.yml).
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Download dependencies
        run: go mod download

      - name: Create frontend dist stub (required by go:embed in main.go)
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run migration unit tests
        run: go test -v -race -count=1 -run "^Test(Normalize|SplitTopLevel|MigrQuote|ParseLocal|CommonColumn|ReplaceDDL|IsDependency|ExecutionPriority|RemoteKey|BuildMigration|ScanMigration)" . 2>&1 | go-junit-report -set-exit-code > report-migration.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report-migration.xml
          check_name: Migration unit tests