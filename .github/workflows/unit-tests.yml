name: Unit Tests

on:
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "frontend/src/**"
      - "frontend/package*.json"
      - "wails.json"
      - ".github/workflows/unit-tests.yml"

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # ── Pure Go unit tests (no system deps, combined to save runner startup) ──
  pure-go-unit-tests:
    name: Pure Go unit tests
    runs-on: self-hosted
    container: ubuntu:24.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl wget python3 python3-pip python3-venv

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: |
          # linux-amd64 matches ubuntu-latest and ubuntu-22.04 on GitHub-hosted runners.
          # If GitHub ever moves ubuntu-latest to ARM, update the architecture suffix.
          wget -qO go-junit-report.tar.gz https://github.com/jstemmer/go-junit-report/releases/download/v2.1.0/go-junit-report-v2.1.0-linux-amd64.tar.gz
          tar -xzf go-junit-report.tar.gz
          mv go-junit-report /usr/local/bin/

      - name: Run DDL tests
        run: go test -v -race -count=1 ./internal/ddl/... 2>&1 | go-junit-report -set-exit-code > report-ddl.xml

      - name: Run SQLEditor tests
        if: always()
        run: go test -v -race -count=1 ./internal/sqleditor/... 2>&1 | go-junit-report -set-exit-code > report-sqleditor.xml

      - name: Run Filesystem tests
        continue-on-error: true
        run: go test -v -race -count=1 ./internal/filesystem/... 2>&1 | go-junit-report -set-exit-code > report-filesystem.xml

      - name: Run Migration tests
        if: always()
        run: go test -v -race -count=1 ./internal/migration/... 2>&1 | go-junit-report -set-exit-code > report-migration.xml

      - name: Run MCP tests
        continue-on-error: true
        run: go test -v -race -count=1 ./internal/mcp/... 2>&1 | go-junit-report -set-exit-code > report-mcp.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          files: report-*.xml
          check_name: Pure Go Unit Tests

      - name: Unlock permissions for host runner agent
        if: always() 
        run: chmod -R 777 $GITHUB_WORKSPACE/../../_actions || true
