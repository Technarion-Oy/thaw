name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/lint.yml'
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Wails embeds the frontend dist; create a stub so the go:embed
      # directive in main.go compiles without a full npm build.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Cache and install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.0-dev
          version: 1.0

      # go install X@version ignores the current module's go.mod, so golangci-lint's
      # own pinned golang.org/x/tools@v0.25.0 gets pulled in and fails to compile
      # under Go 1.26.2. Build from a temp module instead, where we can promote
      # x/tools to the version already used by this project (v0.42.0).
      - name: Install golangci-lint
        run: |
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          go mod init _lint
          go get github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          go get golang.org/x/tools@v0.42.0
          go mod download all
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m
