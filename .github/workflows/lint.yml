name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/lint.yml'
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Wails embeds the frontend dist; create a stub so the go:embed
      # directive in main.go compiles without a full npm build.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Cache and install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1.4.3
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.0-dev
          version: 1.0

      # go install compiles golangci-lint from source using the Go toolchain set up
      # above. Pre-built binaries (via golangci-lint-action) are compiled against an
      # older Go release and fail on projects requiring a newer Go version.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m
