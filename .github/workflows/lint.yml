name: Lint

# Least-privilege default: read-only token unless a job opts into more.
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/lint.yml'
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

env:
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: self-hosted
    container: ubuntu:24.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl wget

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Wails embeds the frontend dist; create a stub so the go:embed
      # directive in main.go compiles without a full npm build.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install system dependencies
        run: apt-get update && apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # golangci-lint pre-built binaries are compiled with Go 1.24 and refuse to run
      # against a module that requires a newer Go version. Compiling from source using
      # the toolchain provided by actions/setup-go is the only reliable workaround
      # until golangci-lint ships a release built with Go 1.26+.
      #
      # go install X@version ignores the current module's go.mod and resolves
      # golangci-lint's minimum transitive deps (e.g. x/tools@v0.25.0), which do not
      # compile under Go 1.26. Seeding a temp module from the project's go.mod lets
      # MVS inherit the project's already-compatible dep graph (x/tools@v0.42.0 etc.)
      # without manually overriding individual packages.
      - name: Install golangci-lint
        run: |
          tmpdir=$(mktemp -d)
          cp go.mod "$tmpdir/go.mod"
          cd "$tmpdir"
          sed -i 's|^module .*|module _lint|' go.mod
          GOFLAGS="-mod=mod" go get github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          GOFLAGS="-mod=mod" go mod download all
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint

      - name: Run golangci-lint
        # webkit2_41: Ubuntu 24.04 only ships libwebkit2gtk-4.1-dev; without this
        # tag, Wails' CGO directives default to webkit2gtk-4.0 and pkg-config fails.
        run: golangci-lint run --timeout=10m --build-tags webkit2_41
