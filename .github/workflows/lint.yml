name: Lint

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint-action manages its own cache

      # Wails embeds the frontend dist; create a stub so the go:embed
      # directive in main.go compiles without a full npm build.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m
