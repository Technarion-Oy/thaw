name: Manual Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview release without publishing)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      # 1. GENERATE THE BOT TOKEN FIRST
      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # 2. CHECKOUT WITH THE BOT TOKEN
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 3. RUN SEMANTIC RELEASE
      - name: Run semantic-release
        run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # 4. CONFIGURE AWS CREDENTIALS
      - name: Configure AWS Credentials
        # We only run this if it's NOT a dry run, so we don't upload fake/test data to S3
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 

      # 5. UPLOAD TO S3
      - name: Upload Changelog and Version to S3
        if: ${{ !inputs.dry_run }}
        run: |
          # 1. Get the latest tag (e.g., v0.1.0)
          VERSION=$(git describe --tags --abbrev=0)
          
          # 2. Save the version to a local file
          echo $VERSION > version.txt
          
          # 3. Upload the generic version.txt (to track current latest)
          aws s3 cp version.txt s3://thaw-s3-bucket-for-website/release/version.txt
          
          # 4. Upload the changelog with the version in the name (e.g., CHANGELOG-v0.1.0.md)
          aws s3 cp CHANGELOG.md s3://thaw-s3-bucket-for-website/release/CHANGELOG-${VERSION}.md
