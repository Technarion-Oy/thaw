name: Manual Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview release without publishing)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Export the new version so the build jobs know what to compile
    outputs:
      published: ${{ steps.check-version.outputs.published }}
      version: ${{ steps.check-version.outputs.version }}

    steps:
      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      # Capture the current latest tag before semantic-release runs
      - name: Get pre-release tag
        id: pre-release
        run: echo "old_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        run: npx semantic-release ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Check if a new tag was created to conditionally trigger S3 upload and builds
      - name: Check if new release was created
        id: check-version
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ "$NEW_TAG" != "${{ steps.pre-release.outputs.old_tag }}" ] && [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            # Strip the 'v' prefix for the binaries (v1.2.3 -> 1.2.3)
            echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT 
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        if: ${{ steps.check-version.outputs.published == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 

      - name: Upload Changelog and Version to S3
        if: ${{ steps.check-version.outputs.published == 'true' }}
        run: |
          echo "v${{ steps.check-version.outputs.version }}" > version.txt
          aws s3 cp version.txt s3://thaw-s3-bucket-for-website/release/version.txt
          aws s3 cp CHANGELOG.md s3://thaw-s3-bucket-for-website/release/CHANGELOG.md

  build:
    name: Build — ${{ matrix.platform }}-${{ matrix.arch }}
    needs: release
    # Only run the build matrix if a new release was actually published
    if: ${{ needs.release.outputs.published == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-15-large  # Intel (x86_64) runner
            platform: darwin
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: windows-latest # cross-compile arm64 on amd64 runner
            platform: windows
            arch: arm64
          - os: ubuntu-24.04
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Explicitly checkout the newly created tag
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download Go dependencies
        run: go mod download

      - name: Install garble
        run: go install mvdan.cc/garble@latest

      - name: Install NSIS (Windows only)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          choco install nsis
          echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH

      # ── Wails Builds (obfuscated via garble) ──────────────────────────────

      - name: Build (macOS & Linux)
        if: matrix.platform != 'windows'
        run: wails build -obfuscated -platform ${{ matrix.platform }}/${{ matrix.arch }} -clean -tags webkit2_41 -ldflags "-s -w -X thaw/internal/version.Version=${{ needs.release.outputs.version }}" -trimpath
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Build & Package Installer (Windows)
        if: matrix.platform == 'windows'
        run: wails build -obfuscated -platform windows/${{ matrix.arch }} -clean -nsis -ldflags "-s -w -X thaw/internal/version.Version=${{ needs.release.outputs.version }}" -trimpath
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # ── Sign Windows binaries (Azure Trusted Signing) ───────────────────────
      - name: Azure Login (Windows only)
        if: matrix.platform == 'windows'
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
          allow-no-subscriptions: true

      - name: Sign Windows binaries
        if: matrix.platform == 'windows'
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_CODE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: build/bin
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Sign, notarize & staple macOS app (Developer ID) ────────────────────

      - name: Set up signing keychain (macOS)
        if: matrix.platform == 'darwin'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          echo "Decoded .p12 size: $(wc -c < "$RUNNER_TEMP/certificate.p12") bytes"

          # Re-pack the p12 with the system LibreSSL before importing. Apple's
          # `security import` rejects several valid p12 variants (PBES2/AES
          # exports from OpenSSL 3, password-encoding mismatches for non-ASCII
          # passwords) with an unhelpful "MAC verification failed".
          # /usr/bin/openssl (LibreSSL) reads both legacy and modern p12 files,
          # and its -export defaults produce a p12 Apple always accepts.
          export REPACK_PASSWORD="$(openssl rand -hex 16)"
          echo "::add-mask::$REPACK_PASSWORD"
          # Decrypt the p12 to PEM, trying several openssl flavors: they differ
          # in cipher support (RC2/3DES needs OpenSSL 3's legacy provider) and
          # in how non-ASCII passwords are encoded for MAC verification
          # (OpenSSL 3 converts UTF-8 to UTF-16 correctly; LibreSSL and Apple's
          # `security` encode byte-wise, so their MAC checks can fail on a
          # password that is in fact correct).
          : > "$RUNNER_TEMP/p12-check.log"
          decrypted=""
          for CMD in "openssl pkcs12" "openssl pkcs12 -legacy" "/usr/bin/openssl pkcs12"; do
            if $CMD -in "$RUNNER_TEMP/certificate.p12" -nodes \
                 -passin env:APPLE_CERTIFICATE_PASSWORD \
                 -out "$RUNNER_TEMP/signing.pem" 2>> "$RUNNER_TEMP/p12-check.log"; then
              echo "Decrypted p12 via: $CMD"
              decrypted=1
              break
            fi
          done
          if [ -z "$decrypted" ]; then
            echo "::error::Cannot open the decoded .p12 with APPLE_CERTIFICATE_PASSWORD — the password or base64 secret is wrong. openssl said:"
            cat "$RUNNER_TEMP/p12-check.log"
            exit 1
          fi
          /usr/bin/openssl pkcs12 -export -in "$RUNNER_TEMP/signing.pem" \
            -passout env:REPACK_PASSWORD -out "$RUNNER_TEMP/certificate-repacked.p12"
          rm "$RUNNER_TEMP/signing.pem"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate-repacked.p12" -k "$KEYCHAIN_PATH" \
            -P "$REPACK_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the key without a UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/certificate-repacked.p12"

      - name: Sign app bundle (macOS)
        if: matrix.platform == 'darwin'
        run: |
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in keychain — check APPLE_CERTIFICATE_BASE64/APPLE_CERTIFICATE_PASSWORD"
            exit 1
          fi
          echo "Signing with identity: $IDENTITY"
          codesign --deep --force --options runtime \
            --timestamp \
            --entitlements build/darwin/entitlements.plist \
            --sign "$IDENTITY" \
            build/bin/thaw.app
          codesign --verify --strict --verbose=2 build/bin/thaw.app

      - name: Notarize and staple (macOS)
        if: matrix.platform == 'darwin'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # ditto preserves extended attributes/resource forks, unlike plain zip
          ditto -c -k --keepParent build/bin/thaw.app build/bin/thaw-notarize.zip

          SUBMISSION=$(xcrun notarytool submit build/bin/thaw-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)
          echo "$SUBMISSION"
          rm build/bin/thaw-notarize.zip

          STATUS=$(echo "$SUBMISSION" | jq -r '.status')
          SUBMISSION_ID=$(echo "$SUBMISSION" | jq -r '.id')
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$STATUS' — fetching log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple build/bin/thaw.app
          spctl -a -vvv -t install build/bin/thaw.app

      - name: Clean up signing keychain (macOS)
        if: always() && matrix.platform == 'darwin'
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/certificate-repacked.p12" "$RUNNER_TEMP/signing.pem"
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      # ── Rename / package output ────────────────────────────────────────────

      - name: Package macOS app bundle
        if: matrix.platform == 'darwin'
        run: |
          cd build/bin
          zip -r "thaw-${{ needs.release.outputs.version }}-darwin-${{ matrix.arch }}.zip" thaw.app

      - name: Rename Windows binaries
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Move-Item build/bin/thaw.exe "build/bin/thaw-${{ needs.release.outputs.version }}-windows-${{ matrix.arch }}-portable.exe"
          Move-Item "build/bin/thaw-${{ matrix.arch }}-installer.exe" "build/bin/thaw-${{ needs.release.outputs.version }}-windows-${{ matrix.arch }}-installer.exe"

      - name: Rename Linux binary
        if: matrix.platform == 'linux'
        run: mv build/bin/thaw "build/bin/thaw-${{ needs.release.outputs.version }}-linux-amd64"

      # ── Linux binary verification (checksums + GPG signing) ───────────────

      - name: Generate checksums (Linux)
        if: matrix.platform == 'linux'
        run: cd build/bin && sha256sum thaw-*-linux-amd64 > checksums.txt

      - name: Import GPG key (Linux)
        if: matrix.platform == 'linux'
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign checksums (Linux)
        if: matrix.platform == 'linux'
        run: cd build/bin && gpg --detach-sign --armor --local-user releases@technarion.com --output checksums.txt.sig checksums.txt

      # ── Attach binaries to GitHub Release ──────────────────────────────────

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          append_body: false
          fail_on_unmatched_files: true
          files: build/bin/thaw-${{ needs.release.outputs.version }}-*

      - name: Upload checksums to GitHub Release (Linux)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          append_body: false
          fail_on_unmatched_files: true
          files: |
            build/bin/checksums.txt
            build/bin/checksums.txt.sig