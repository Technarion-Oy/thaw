name: Vulnerability Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  govulncheck:
    name: govulncheck
    runs-on: self-hosted
    container: ubuntu:24.04
    permissions:
      contents: read

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y git curl wget

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Wails embeds the frontend dist; create a stub so the go:embed
      # directive in main.go compiles without a full npm build.
      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Install system dependencies
        run: |
          apt-get update -q
          apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Download dependencies
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # webkit2_41: Ubuntu 24.04 only ships libwebkit2gtk-4.1-dev; without this
        # tag, Wails' CGO directives default to webkit2gtk-4.0 and pkg-config fails.
        run: govulncheck -tags webkit2_41 ./...
