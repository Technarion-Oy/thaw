name: Test Azure Login

on:
  workflow_dispatch:

jobs:
  test-login:
    name: Test Azure Login
    runs-on: windows-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          allow-no-subscriptions: true

      - name: Verify login
        shell: pwsh
        run: az account show
